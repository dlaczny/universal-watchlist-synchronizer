services:
  vod-filter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vod-filter-sync
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_PATH: ./data/vod-filter.db
    volumes:
      - ./data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import sys; from src.config import load_config; load_config(); cmd=open('/proc/1/cmdline','rb').read().decode('utf-8','ignore'); sys.exit(0 if 'continuous_sync.py' in cmd and '--continuous' in cmd else 1)\""
        ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
