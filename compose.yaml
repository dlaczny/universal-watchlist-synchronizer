services:
  mongo:
    image: mongo:8.0
    container_name: watchlist-mongo
    ports:
      - "27017:27017"
    volumes:
      - watchlist-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  watchlist-mongo-data:
