name: Movie CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: movie-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  okf:
    name: OKF validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Validate OKF bundle
        run: python tests/validate_okf.py

      - name: Install deployment test dependency
        run: python -m pip install "pytest>=8.0.0" "PyYAML>=6.0.0"

      - name: Test deployment tooling
        run: python -m pytest tests/deployment -q

      - name: Test TV deployment contract
        run: python -m pytest tests/deployment/test_tv_phase1_deployment.py -q

  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:8.0@sha256:f93b9015613e393b76fdf4fb71f3435ece6a3b46cc56c62c08875ad08442aa4c
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore backend/Watchlist.sln

      - name: Build
        run: dotnet build backend/Watchlist.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test backend/Watchlist.sln --configuration Release --no-restore

  worker:
    name: Worker tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: workers/vod-filter
        run: python -m pip install -r requirements.txt "pytest>=8.0.0"

      - name: Test
        working-directory: workers/vod-filter
        run: python -m pytest -q

      - name: Compile production entry points
        working-directory: workers/vod-filter
        run: python -m compileall -q src continuous_sync.py sync_movies.py reconcile_sync.py healthcheck.py

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Scan Git history
        run: >-
          docker run --rm
          -v "$PWD:/repo"
          zricethezav/gitleaks:v8.30.1@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f
          git --redact --no-banner --verbose /repo

      - name: Scan checked-out files
        run: >-
          docker run --rm
          -v "$PWD:/repo"
          zricethezav/gitleaks:v8.30.1@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f
          dir --redact --no-banner --verbose /repo

  containers:
    name: Production containers
    runs-on: ubuntu-latest
    needs:
      - okf
      - backend
      - worker
      - secret-scan
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build backend image
        run: docker build -f backend/src/Watchlist.Api/Dockerfile -t watchlist-api:${{ github.sha }} .

      - name: Build worker image
        run: docker build -t watchlist-worker:${{ github.sha }} workers/vod-filter
