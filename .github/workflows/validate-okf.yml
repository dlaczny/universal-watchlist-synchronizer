name: Validate OKF

on:
  pull_request:
    paths:
      - "docs/**"
      - "tests/validate_okf.py"
      - ".github/workflows/validate-okf.yml"
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "tests/validate_okf.py"
      - ".github/workflows/validate-okf.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate OKF bundle
        run: python tests/validate_okf.py

